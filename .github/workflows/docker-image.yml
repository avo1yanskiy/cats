name: Build and Deploy Cat Site

on:
  push:
    branches: ["main", "master", "dev"]

env:
  DOCKER_IMAGE_NAME: cat-site

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push cat-site Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}

      - name: Build and push bot Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./bot
          file: ./bot/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/cat-bot:latest
            ${{ secrets.DOCKER_USERNAME }}/cat-bot:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create nginx.conf file for server
        run: |
          cat > nginx.conf << 'EOF'
          # HTTP
          server {
              listen 80;
              server_name purr-tales.ru;

              location /.well-known/acme-challenge/ {
                  proxy_pass http://cat-site:80;
              }

              location / {
                  return 301 https://$host$request_uri;
              }
          }

          # HTTPS
          server {
              listen 443 ssl http2;
              server_name purr-tales.ru;

              ssl_certificate /etc/letsencrypt/live/purr-tales.ru/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/purr-tales.ru/privkey.pem;

              ssl_protocols TLSv1.2 TLSv1.3;
              ssl_prefer_server_ciphers on;

              location / {
                  proxy_pass http://cat-site:80;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }
          EOF

      - name: Create docker-compose file for server
        run: |
          cat > docker-compose.prod.yml << EOF
          version: '3.8'

          services:
            nginx:
              image: nginx:alpine
              container_name: cat-nginx
              ports:
                - "80:80"
                - "443:443"
              volumes:
                - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
                - certbot-ssl:/etc/letsencrypt:ro
                - certbot-challenge:/var/www/certbot:ro
              restart: unless-stopped
              depends_on:
                - cat-site
              networks:
                - cat-network

            cat-site:
              image: ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
              container_name: cat-site
              expose:
                - "80"
              restart: unless-stopped
              networks:
                - cat-network

            certbot:
              image: certbot/certbot
              container_name: cat-certbot
              volumes:
                - certbot-ssl:/etc/letsencrypt
                - certbot-challenge:/var/www/certbot
              command: >
                renew --webroot --webroot-path=/var/www/certbot --non-interactive
              restart: on-failure
              networks:
                - cat-network

            bot:
              image: ${{ secrets.DOCKER_USERNAME }}/cat-bot:${{ github.sha }}
              container_name: cat-bot
              restart: always
              network_mode: host
              environment:
                - TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
                - TOKEN_BOT=${{ secrets.TOKEN_BOT }}
                - REPO_BOT=${{ secrets.REPO_BOT }}

          networks:
            cat-network:
              driver: bridge

          volumes:
            certbot-ssl:
            certbot-challenge:
          EOF

      - name: Test SSH connection
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "SSH connected!"
            ls -la /opt/

      - name: Copy files to server
        if: success()
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.prod.yml,nginx.conf"
          target: "/opt/cat-site/"
          overwrite: true

      - name: Deploy on server
        if: success()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/cat-site/
            docker volume create certbot-ssl 2>/dev/null || true
            docker compose -f docker-compose.prod.yml down || true
            docker compose -f docker-compose.prod.yml up -d
            sleep 10
            docker logs cat-nginx --tail 5
            docker logs cat-bot --tail 10
            echo "✅ Done!"
