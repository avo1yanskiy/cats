name: Build and Deploy Cat Site

on:
  push:
    branches: [ "main", "master" ]

env:
  DOCKER_IMAGE_NAME: cat-site

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Debug SSH key (check if exists)
        run: |
          if [ -n "${{ secrets.SERVER_SSH_KEY }}" ]; then
            echo "SSH key exists, length: ${#SERVER_SSH_KEY}"
            # Проверяем начало ключа
            echo "Key starts with: ${SERVER_SSH_KEY:0:20}..."
          else
            echo "ERROR: SSH key is empty!"
            exit 1
          fi
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
      
      - name: Create docker-compose file for server
        run: |
          cat > docker-compose.prod.yml << EOF
          version: '3.8'
          
          services:
            cat-site:
              image: ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
              container_name: cat-site
              ports:
                - "80:80"
              restart: unless-stopped
          EOF
      
      - name: Test SSH connection first
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "SSH connection successful!"
            ls -la /app/
      
      - name: Copy docker-compose to server
        if: success()
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/app/cat-site/"
          overwrite: true
      
      - name: Deploy on server
        if: success()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /app/cat-site
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
            docker-compose -f docker-compose.prod.yml down || true
            docker-compose -f docker-compose.prod.yml up -d
            docker image prune -f
            echo "✅ Deployment completed!"
            docker ps | grep cat-site
