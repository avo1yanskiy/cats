services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-ssl:/etc/letsencrypt:ro
    restart: unless-stopped
    depends_on:
      - cat-site
    networks:
      - cat-network

  cat-site:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - cat-network

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-ssl:/etc/letsencrypt
    command: renew --webroot --webroot-path=/var/www/certbot --non-interactive
    restart: on-failure
    networks:
      - cat-network

networks:
  cat-network:
    driver: bridge

volumes:
  certbot-ssl: