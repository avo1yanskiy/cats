# HTTP — для ACME challenge
server {
    listen 80;
    server_name purr-tales.ru dev.purr-tales.ru;
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Временно: сайт по HTTP до получения сертификатов
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}

