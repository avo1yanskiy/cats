# HTTP — для ACME challenge и редиректа на HTTPS
server {
    listen 80;
    server_name purr-tales.ru dev.purr-tales.ru;
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — основной сервер
server {
    listen 443 ssl http2;
    server_name purr-tales.ru dev.purr-tales.ru;
    
    ssl_certificate /etc/letsencrypt/live/purr-tales.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/purr-tales.ru/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    
    root /usr/share/nginx/html;
    index index.html;
    
    location / {
        try_files $uri $uri/ /index.html;
    }
}